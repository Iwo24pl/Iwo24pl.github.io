<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container.vis</title>
    <style>
        #whole {
            border: 3px dashed rgb(3, 20, 82);
            border-radius: 7.5px;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
            padding: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            bottom: 0;
            width: 80%;
            height: 27%;
        }
        

        .info {
            border: 3px double rgb(3, 20, 82);
            border-radius: 7.5px;
            margin-bottom: 10px;
            margin-top: 5px;
        }
        
        a {
            color: rgb(0, 158, 158);
            text-decoration: none;
            transition-duration: 0.5s;
        }
        
        .navigation {
            display: inline;
            padding: 15px;
            font-size: 15px;
        }
        a:hover {
            color: red;
            transition-duration: 0.5s;
        }

        #pr {
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div id="whole">
        <div class="info">
        <h1><i>LINUX</i></h1>
        <h3>- czyli system <w style="color: red">nie</w> dla opornych.</h3>
        </div>
        <div class="info">
        <ul>
            <li class="navigation"><a href="/giganci/linux/arch">Arch! (for da hardies)</a></li>
            <li class="navigation"><a href="/giganci/linux/debian">Debian (easy arch)*</a></li>
            <li class="navigation"><a href="/giganci/linux/ubuntu">Ubuntu (lets begginer!)*</a></li>
        </ul>
        <p id="pr">*=work in progres</p>
        </div>
    </div>
</body>
</html>
