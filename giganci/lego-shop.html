<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lego® Shop</title>
    <link rel="icon" href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%3Fid%3DOIP.XIjDw7ofQPnf0FsK3xikkQAAAA%26pid%3DApi%26h%3D160&f=1&ipt=aa9e4dcdc21ee492b4096eeb1ad883cd79c26f414820690402e8fcf87e297fe5&ipo=images">
    <style>
        #container {
            border: 3px dashed rgb(3, 20, 82);
            border-radius: 7.5px;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
            padding: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            bottom: 0;
            width: 90%;
            height: 92%;
        }
        #logo {
            width: 100px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 10px
        }
        hr{
            height: 1px;
            border: none;
            background-color: black;
        }
        #buttons button {
            margin-left: 5px;
            margin-right: 5px;
            margin-top: auto;
            margin-bottom: auto;
            padding: 5px;
            border-radius: 10px;
            font-size: 15px;
            background-color: black;
            color: white;
            transition-duration: 0.5s;
        }

        #buttons button:hover {
            background-color: white;
            color: black;
            transition-duration: 0.5s;
            cursor: pointer;
        }
        
        #buttons {
            margin-top: 10px;
            border: 2px dashed black;
            border-radius: 10px;
            padding: 20px;
            margin-left: auto;
            margin-right: auto;
            width: 70%;
        }
        
        #info {
            margin-top: 10px;
            border: 2px dashed black;
            border-radius: 10px;
            padding: 20px;
            margin: auto;
            margin-top: 20px;
            width: 70%;
            height: 60%;
            text-align: left;
        }

        #info p {
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="logo">
            <img src="https://drive.google.com/thumbnail?id=1Asafsm8izgO0uo-QfsB43UmFWk7yWLnj">
        </div>
        <div id="buttons">
            <a><button>STRONA GŁÓWNA</button></a>
            <a><button>SKLEP</button></a>
            <a><button>PROJEKTY</button></a>
            <a><button>O NAS</button></a>
        </div>
        <div id="info">
            <h1 style="text-align: center">LEGO WEDO 2.0</h1>
            <p>Lego WeDo 2.0 is a perfect kit for newcommers to <i>Coding with Lego</i>.</p>
        </div>
    </div>
</body>
</html>
