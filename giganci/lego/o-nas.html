<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lego® Shop</title>
    <link rel="icon" href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%3Fid%3DOIP.XIjDw7ofQPnf0FsK3xikkQAAAA%26pid%3DApi%26h%3D160&f=1&ipt=aa9e4dcdc21ee492b4096eeb1ad883cd79c26f414820690402e8fcf87e297fe5&ipo=images">
    <style>
        #container {
            border: 3px dashed rgb(3, 20, 82);
            border-radius: 7.5px;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
            padding: 10px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            bottom: 0;
            width: 90%;
            height: 90%;
        }
        #logo {
            display: block;
            width: 100px;
            margin: auto;
            padding: 0;
        }

        hr{
            height: 1px;
            border: none;
            background-color: black;
        }
        #buttons button {
            margin-left: 5px;
            margin-right: 5px;
            margin-top: auto;
            margin-bottom: auto;
            padding: 5px;
            border-radius: 10px;
            font-size: 15px;
            background-color: black;
            color: white;
            transition-duration: 0.5s;
        }

        #buttons button:hover {
            background-color: white;
            color: black;
            transition-duration: 0.5s;
            cursor: pointer;
        }
        
        #buttons {
            margin-top: 10px;
            border: 2px dashed black;
            border-radius: 10px;
            padding: 20px;
            margin-left: auto;
            margin-right: auto;
            width: 70%;
        }
        
        #info {
            margin-top: 10px;
            border: 2px dashed black;
            border-radius: 10px;
            padding: 20px;
            margin: auto;
            margin-top: 20px;
            width: 70%;
            height: 60%;
            p {
                font-size: 15px;
                text-align: left;
            }
            fieldset {
                margin-top: 10%;
                border-width: 2px;
                border-radius: 40px;
                border-color: rgb(3, 20, 82);
                border-style: solid;
            }        
        }

        a {
            transition-duration: .5s;
            text-decoration: none;
            color: rgb(0, 200, 200);
        }
        
        a:hover{
                transition-duration: .5s;
                color: red;
        }
    </style>
</head>
<body>
    <div id="container">
        <img id="logo" src="https://drive.google.com/thumbnail?id=1Asafsm8izgO0uo-QfsB43UmFWk7yWLnj">
        <div id="buttons">
            <a href="giganci/lego-shop"><button>STRONA GŁÓWNA</button></a>
            <a><button>SKLEP</button></a>
            <a><button>PROJEKTY</button></a>
            <a href="giganci/lego/o-nas.html"><button>O NAS</button></a>
        </div>
        <div id="info">
            <form>
                <fieldset>
                    <legend>O nas</legend>
                    <p>Jesteśmy certyfikowanym sklepem Lego® w Katowicach.</p>
                    <p>Zapraszamy do kontaktu! Dane poniżej.</p>
                </fieldset>
            </form>
            <form>
                <fieldset>
                <legend>Dane kontaktowe</legend>
                <p>Lego Shop Katowice, ul. Łukasiewicza 4, Katowice.</p>
                <p>Nr. telefonu: <a href="tel:+48000000000">+48 000 000 000</a>.</p>
                <p>Adres email: <a href="mailto:katowice@lego.example.com">katowice@lego.example.com</a>.</p>
                </fieldset>
            </form>
        </div>
    </div>
</body>
</html>
